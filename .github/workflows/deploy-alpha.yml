name: Alpha-Deploy

on: 
  push:
    branches: [alpha-test]


jobs:
  last-minute-test:
    permissions:
      contents: read
    runs-on: ubuntu-latest    
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: set up python  3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with: 
          python-version: 3.14
      - run: pip install . montepy[develop]
      - run: python -m pytest
      
  build-packages:
    name: Build, sign, and release packages on github
    environment:
      name: build-pypi
    runs-on: ubuntu-latest
    needs: [last-minute-test]
    permissions:
      contents: write  # IMPORTANT: mandatory for making GitHub Releases
      id-token: write  # IMPORTANT: mandatory for sigstore
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: set up python  3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with: 
          python-version: 3.14
      - run: pip install . montepy[build]
      - name: Get Version
        id: get_version
        run: echo "version=`python -m setuptools_scm`" >> $GITHUB_OUTPUT
      - name: Verify that this is a non-dev alpha release
        run: .github/scripts/check_version.py --alpha 
      - run: python -m build .
      - name: Sign the dists with Sigstore
        uses: sigstore/gh-action-sigstore-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          inputs: >-
            ./dist/*.tar.gz
            ./dist/*.whl
      - name: Create a GitHub release
        run: | 
            gh release create "v${ steps.get_version.outputs.version }" \
            --title="Release ${ steps.get_version.outputs.version }" \
            --generate-notes -d
      - run: >-
          gh release upload
          'v${{ steps.get_version.outputs.version }}' dist/**
          --repo '${{ github.repository }}'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with: 
           name: build
           path: |
               dist/*.tar.gz 
               dist/*.whl


  deploy-test-pypi: 
    environment:
      name: test-pypi
      url: https://test.pypi.org/p/montepy  # Replace <package-name> with your PyPI project name
    needs: [build-packages]
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: build
          path: dist/
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          repository-url: https://test.pypi.org/legacy/

  deploy-pypi: 
    environment:
      name: pypi
      url: https://pypi.org/p/montepy  # Replace <package-name> with your PyPI project name
    needs: [deploy-test-pypi, build-packages]
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: build
          path: dist/
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b

